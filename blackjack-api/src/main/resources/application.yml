spring:
  application:
    name: blackjack-api

  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1}
    username: ${SPRING_R2DBC_USERNAME:sa}
    password: ${SPRING_R2DBC_PASSWORD:}

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/blackjack}
    r2dbc:
      repositories:
        enabled: true
    repositories:
      enabled: true

server:
  port: ${PORT:8080}

# JWT
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-min-256-bits-placeholder}
  expiration: 86400000


# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.blackjack: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} ? %msg%n"